<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>성적 확인 · 충북반도체고 1학년 6반</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wafer:#E5E8EC;
    --surface:#FFFFFF;
    --ink:#131A24;
    --muted:#6B7688;
    --hair:#CFD5DC;
    --probe:#2B4ACB;
    --anneal:#D98A1F;
    --pass:#1E7A5A;
    --sans:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Malgun Gothic",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--sans);
    background:var(--wafer);
    background-image:
      linear-gradient(var(--hair) 1px,transparent 1px),
      linear-gradient(90deg,var(--hair) 1px,transparent 1px);
    background-size:44px 44px;
    background-position:-1px -1px;
    color:var(--ink);
    min-height:100vh;
    padding:24px 16px 64px;
    display:flex;justify-content:center;
    line-height:1.5;
  }
  .shell{width:100%;max-width:680px}

  /* ---------- 헤더 ---------- */
  .masthead{
    display:flex;align-items:baseline;justify-content:space-between;
    gap:12px;padding-bottom:10px;margin-bottom:20px;
    border-bottom:2px solid var(--ink);
  }
  .masthead h1{
    font-size:15px;font-weight:800;letter-spacing:-.02em;
  }
  .masthead .term{
    font-family:var(--mono);font-size:11px;font-weight:500;
    color:var(--muted);letter-spacing:.06em;white-space:nowrap;
  }

  /* ---------- 로그인 ---------- */
  .gate{
    background:var(--surface);
    border:1px solid var(--hair);
    border-top:3px solid var(--ink);
    padding:32px 24px 28px;
  }
  .gate .eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    color:var(--probe);font-weight:700;margin-bottom:10px;
  }
  .gate h2{font-size:24px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
  .gate p.lead{font-size:13.5px;color:var(--muted);margin-bottom:24px}

  .field{position:relative}
  #code{
    width:100%;
    font-family:var(--mono);font-size:26px;font-weight:700;
    letter-spacing:.42em;text-indent:.42em;text-align:center;
    text-transform:uppercase;
    padding:18px 12px;
    color:var(--ink);
    background:#F7F8FA;
    border:1.5px solid var(--hair);
    border-radius:0;
    outline:none;
    transition:border-color .15s,background .15s;
  }
  #code::placeholder{color:#B9C0C9;font-weight:400;letter-spacing:.42em}
  #code:focus{border-color:var(--probe);background:#fff;box-shadow:0 0 0 3px rgba(43,74,203,.12)}
  #code.err{border-color:#C0392B;background:#FEF6F5}

  .ticks{
    display:flex;justify-content:space-between;
    margin-top:6px;padding:0 2px;
  }
  .ticks span{
    width:1px;height:5px;background:var(--hair);
  }

  button.go{
    width:100%;margin-top:18px;padding:15px;
    font-family:var(--sans);font-size:15px;font-weight:700;letter-spacing:-.01em;
    color:#fff;background:var(--ink);
    border:none;border-radius:0;cursor:pointer;
    transition:background .15s;
  }
  button.go:hover{background:var(--probe)}
  button.go:disabled{background:#8A93A0;cursor:progress}
  button.go:focus-visible,#code:focus-visible{outline:2px solid var(--probe);outline-offset:2px}

  .msg{
    margin-top:14px;font-size:13px;min-height:19px;
    font-weight:600;color:#C0392B;
  }
  .gate .note{
    margin-top:24px;padding-top:16px;border-top:1px dashed var(--hair);
    font-size:12px;color:var(--muted);line-height:1.7;
  }

  /* ---------- 성적표 ---------- */
  .card{background:var(--surface);border:1px solid var(--hair);border-top:3px solid var(--ink)}
  .hidden{display:none}

  .who{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:16px;padding:24px 22px 20px;border-bottom:1px solid var(--hair);
  }
  .who .cls{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.08em}
  .who .nm{font-size:30px;font-weight:800;letter-spacing:-.035em;line-height:1.15;margin-top:2px}
  .who button{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    color:var(--muted);background:none;border:1px solid var(--hair);
    padding:7px 10px;cursor:pointer;white-space:nowrap;
  }
  .who button:hover{color:var(--ink);border-color:var(--ink)}

  /* 순위 — 시그니처: 계측 눈금 위의 지표 */
  .ranks{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--hair)}
  .rank{padding:20px 22px}
  .rank + .rank{border-left:1px solid var(--hair)}
  .rank .lab{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    color:var(--muted);font-weight:500;margin-bottom:6px;
  }
  .rank .val{font-family:var(--mono);font-weight:700;letter-spacing:-.02em;line-height:1}
  .rank .val b{font-size:40px;color:var(--probe)}
  .rank .val i{font-size:15px;font-style:normal;color:var(--muted)}
  .scale{position:relative;height:22px;margin-top:12px}
  .scale .rail{position:absolute;top:9px;left:0;right:0;height:2px;background:#E3E7EB}
  .scale .fill{position:absolute;top:9px;left:0;height:2px;background:var(--probe);
    width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .scale .pin{
    position:absolute;top:2px;width:2px;height:16px;background:var(--ink);
    left:0;transform:translateX(-1px);
    transition:left .9s cubic-bezier(.2,.8,.2,1);
  }
  .scale .ends{
    position:absolute;top:16px;left:0;right:0;display:flex;justify-content:space-between;
    font-family:var(--mono);font-size:9.5px;color:#A6AEB9;
  }

  /* 요약 */
  .sums{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--hair)}
  .sum{padding:16px 22px;text-align:left}
  .sum + .sum{border-left:1px solid var(--hair)}
  .sum .lab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:5px}
  .sum .v{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-.02em}
  .sum .v small{font-size:11px;color:var(--muted);font-weight:500;margin-left:2px}

  /* 과목 */
  .sec{
    display:flex;align-items:center;gap:8px;
    padding:18px 22px 10px;
  }
  .sec h3{font-size:13px;font-weight:800;letter-spacing:-.01em}
  .sec .legend{
    margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);
    display:flex;align-items:center;gap:5px;
  }
  .sec .legend em{
    display:inline-block;width:2px;height:11px;background:var(--anneal);font-style:normal;
  }

  .rows{padding:0 22px 8px}
  .row{padding:13px 0;border-bottom:1px solid #EEF1F3}
  .row:last-child{border-bottom:none}
  .row .top{display:flex;align-items:baseline;gap:8px;margin-bottom:9px}
  .row .sub{font-size:14.5px;font-weight:700;letter-spacing:-.015em}
  .row .cr{
    font-family:var(--mono);font-size:10px;color:var(--muted);
    border:1px solid var(--hair);padding:1px 4px;
  }
  .row .sc{margin-left:auto;font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-.02em}
  .row .dv{margin-left:8px;font-family:var(--mono);font-size:11px;font-weight:500}
  .dv.up{color:var(--pass)} .dv.dn{color:#B2453A} .dv.eq{color:var(--muted)}

  /* 시그니처: 과목별 계측 눈금 */
  .gauge{position:relative;height:14px}
  .gauge .track{
    position:absolute;top:5px;left:0;right:0;height:4px;background:#EDF0F3;
  }
  .gauge .bar{
    position:absolute;top:5px;left:0;height:4px;background:var(--ink);
    width:0;transition:width .8s cubic-bezier(.2,.8,.2,1);
  }
  .gauge .avg{
    position:absolute;top:0;width:2px;height:14px;background:var(--anneal);
    transform:translateX(-1px);
  }
  .gauge .grid{position:absolute;top:5px;left:0;right:0;height:4px;display:flex;justify-content:space-between}
  .gauge .grid i{width:1px;height:4px;background:#fff;opacity:.9}

  .foot{
    padding:16px 22px 20px;border-top:1px solid var(--hair);
    font-size:11.5px;color:var(--muted);line-height:1.7;
  }
  .foot code{font-family:var(--mono);background:#F1F3F5;padding:1px 4px}

  @media (max-width:420px){
    .who .nm{font-size:26px}
    .rank .val b{font-size:34px}
    .sums{grid-template-columns:1fr 1fr}
    .sum:nth-child(3){grid-column:1/-1;border-left:none;border-top:1px solid var(--hair)}
    #code{font-size:21px;letter-spacing:.3em;text-indent:.3em}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
  .reveal{animation:rise .45s cubic-bezier(.2,.8,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="shell">

  <header class="masthead">
    <h1>충북반도체고 · 1학년 6반 성적 확인</h1>
    <span class="term">2026-1</span>
  </header>

  <!-- 로그인 -->
  <section class="gate card" id="gate">
    <div class="eyebrow">CODE REQUIRED</div>
    <h2>본인 확인 코드를 입력하세요</h2>
    <p class="lead">선생님께 받은 8자리 코드를 넣으면 본인 성적만 열립니다.</p>

    <div class="field">
      <input id="code" type="text" inputmode="latin" autocomplete="off" autocapitalize="characters"
             spellcheck="false" maxlength="8" placeholder="────────" aria-label="8자리 확인 코드">
      <div class="ticks" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <button class="go" id="go">성적 확인</button>
    <p class="msg" id="msg" role="status" aria-live="polite"></p>

    <p class="note">
      코드는 학생마다 다릅니다. 다른 사람의 코드로는 그 사람 성적이 열리므로 코드를 공유하지 마세요.<br>
      코드를 잃어버렸으면 담임 선생님께 문의하세요.
    </p>
  </section>

  <!-- 성적표 -->
  <section class="card hidden" id="sheet">
    <div class="who">
      <div>
        <div class="cls" id="cls"></div>
        <div class="nm" id="nm"></div>
      </div>
      <button id="out">닫기</button>
    </div>

    <div class="ranks">
      <div class="rank">
        <div class="lab">전교 순위</div>
        <div class="val"><b id="r1">–</b><i id="r1n"></i></div>
        <div class="scale">
          <div class="rail"></div><div class="fill" id="r1f"></div><div class="pin" id="r1p"></div>
          <div class="ends"><span>1위</span><span id="r1e"></span></div>
        </div>
      </div>
      <div class="rank">
        <div class="lab">반 순위</div>
        <div class="val"><b id="r2">–</b><i id="r2n"></i></div>
        <div class="scale">
          <div class="rail"></div><div class="fill" id="r2f"></div><div class="pin" id="r2p"></div>
          <div class="ends"><span>1위</span><span id="r2e"></span></div>
        </div>
      </div>
    </div>

    <div class="sums">
      <div class="sum"><div class="lab">가중평균</div><div class="v" id="wavg"></div></div>
      <div class="sum"><div class="lab">단순평균</div><div class="v" id="avg"></div></div>
      <div class="sum"><div class="lab">총점</div><div class="v" id="total"></div></div>
    </div>

    <div class="sec">
      <h3>과목별 점수</h3>
      <span class="legend"><em></em> 우리 반 평균</span>
    </div>
    <div class="rows" id="rows"></div>

    <div class="foot" id="foot"></div>
  </section>

</div>

function render(d) {
  $('gate').classList.add('hidden');
  const sheet = $('sheet');
  sheet.classList.remove('hidden');
  sheet.classList.remove('reveal'); void sheet.offsetWidth; sheet.classList.add('reveal');

  $('cls').textContent = d.cls + '반 ' + String(d.no).padStart(2, '0') + '번';
  $('nm').textContent = d.name;

  $('wavg').innerHTML = d.wavg.toFixed(2) + '<small>점</small>';
  $('avg').innerHTML = d.avg.toFixed(1) + '<small>점</small>';
  $('total').innerHTML = d.total.toFixed(1) + '<small>점</small>';

  setRank('r1', d.rank, d.rankN);
  setRank('r2', d.crank, d.crankN);

  const rows = $('rows');
  rows.innerHTML = '';
  d.subs.forEach((s, i) => {
    const dv = s.s - s.a;
    const cl = Math.abs(dv) < 0.05 ? 'eq' : (dv > 0 ? 'up' : 'dn');
    const sign = dv > 0 ? '▲ +' : (dv < 0 ? '▼ ' : '± ');
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML =
      '<div class="top">' +
        '<span class="sub"></span>' +
        '<span class="cr"></span>' +
        '<span class="sc"></span>' +
        '<span class="dv ' + cl + '"></span>' +
      '</div>' +
      '<div class="gauge">' +
        '<div class="track"></div>' +
        '<div class="bar"></div>' +
        '<div class="grid">' + '<i></i>'.repeat(11) + '</div>' +
        '<div class="avg" title="우리 반 평균"></div>' +
      '</div>';
    row.querySelector('.sub').textContent = s.n;
    row.querySelector('.cr').textContent = s.c + '학점';
    row.querySelector('.sc').textContent = s.s.toFixed(2);
    row.querySelector('.dv').textContent = sign + Math.abs(dv).toFixed(1);
    row.querySelector('.avg').style.left = clamp(s.a) + '%';
    rows.appendChild(row);
    const bar = row.querySelector('.bar');
    setTimeout(() => { bar.style.width = clamp(s.s) + '%'; }, 90 + i * 55);
  });

  const cr = d.subs.reduce((a, s) => a + s.c, 0);
  $('foot').innerHTML =
    '가중평균은 과목 학점(총 ' + cr + '학점)을 반영해 계산한 점수이고, 순위는 이 가중평균 기준입니다. ' +
    '<code>▲/▼</code>는 우리 반 평균과의 차이입니다. 점수에 이의가 있으면 해당 과목 선생님께 문의하세요.';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setRank(k, r, n) {
  if (r == null) { $(k).textContent = '–'; return; }
  $(k).textContent = r;
  $(k + 'n').textContent = ' / ' + n + '위';
  $(k + 'e').textContent = n + '위';
  const pct = n > 1 ? (1 - (r - 1) / (n - 1)) * 100 : 100;
  const pin = $(k + 'p'), fill = $(k + 'f');
  fill.style.width = '0%'; pin.style.left = '0%';
  setTimeout(() => { fill.style.width = pct + '%'; pin.style.left = pct + '%'; }, 120);
}

const clamp = v => Math.max(0, Math.min(100, v));
codeEl.focus();
</script>
</body>
</html>
